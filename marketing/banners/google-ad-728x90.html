<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haqqi Google Ad 728x90</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/brand.css" />
  <style>
    body { display:grid; place-items:center; min-height:100vh; margin:0; }
    /* Leaderboard: 728×90 — very tight height, all content must be single-row */
    .ad { width:728px; height:90px; padding:10px 16px; display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:center; overflow:hidden; }
    .logo-mark { width:32px; height:32px; font-size:17px; }
    .logo-inline { gap:10px; font-size:14px; }
    .copy { overflow:hidden; }
    .copy strong { display:block; font-size:22px; line-height:1; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .copy span { display:block; color:#dce8f4; font-size:11px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cta { padding:9px 14px; border-radius:999px; background:var(--gold-gradient); color:#14314e; font-weight:800; font-size:14px; white-space:nowrap; }
  </style>
</head>
<body>
  <section class="ad canvas noise">
    <div class="logo-inline"><span class="logo-mark">ح</span><span>حقي</span></div>
    <div class="copy"><strong>WPS + Gratuity + Settlements</strong><span class="ar">منصة واحدة لإدارة الامتثال والمستحقات</span></div>
    <div class="cta">Book Demo</div>
  </section>
</body>
</html>
