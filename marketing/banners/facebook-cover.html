<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haqqi Facebook Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/brand.css" />
  <style>
    body { display:grid; place-items:center; min-height:100vh; margin:0; }
    .cover { width:820px; height:312px; padding:26px 34px; display:grid; grid-template-columns:1.15fr 0.85fr; gap:20px; align-items:center; overflow:hidden; }
    /* Reduced headline to prevent 3+ line wrapping in ~430px column */
    .cover .headline { font-size:34px; line-height:1.05; margin:0; }
    /* Fixed Arabic subhead size to prevent clamp() vw expansion */
    .cover .subhead { font-size:14px; line-height:1.5; margin:4px 0 0; }
    /* Panel: auto height, capped to fit within banner */
    .panel { padding:16px; height:auto; max-height:240px; display:grid; gap:10px; align-content:start; overflow:hidden; }
    .panel .row { display:flex; justify-content:space-between; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.08); font-size:14px; }
    .panel .cta-button { font-size:14px; padding:10px 18px; }
  </style>
</head>
<body>
  <section class="cover canvas noise">
    <div>
      <div class="logo-inline"><span class="logo-mark">ح</span><span>حقي | HAQQI</span></div>
      <h1 class="headline">One platform for payroll compliance and employee settlements.</h1>
      <p class="subhead ar">حل احترافي لإدارة الالتزام والمستحقات للشركات الصغيرة والمتوسطة في الخليج.</p>
    </div>
    <div class="panel metric-card">
      <div class="row" style="display:flex; justify-content:space-between;"><span>WPS</span><strong>Automated checks</strong></div>
      <div class="row" style="display:flex; justify-content:space-between;"><span>Gratuity</span><strong>Policy-based</strong></div>
      <div class="row" style="display:flex; justify-content:space-between;"><span>Settlements</span><strong>Instant summaries</strong></div>
      <a class="cta-button" href="#" style="justify-self:start;">Get started</a>
    </div>
  </section>
</body>
</html>
